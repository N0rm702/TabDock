<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabDock - Quick Save</title>
  <meta name="description" content="Quickly group and dock active tabs into an organized workspace.">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <svg class="brand-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="24" height="24">
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#818cf8" />
              <stop offset="100%" stop-color="#c084fc" />
            </linearGradient>
          </defs>
          <rect x="10" y="10" width="108" height="108" rx="24" fill="url(#logoGrad)" />
          <rect x="30" y="30" width="68" height="50" rx="8" fill="#ffffff" fill-opacity="0.25" stroke="#ffffff" stroke-width="4" />
          <path d="M 45 55 L 55 65 L 75 45" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <h1 id="main-title">TabDock</h1>
      </div>
      <button id="btn-open-dashboard" class="icon-btn" title="Open Full Dashboard" aria-label="Open Dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="9" />
          <rect x="14" y="3" width="7" height="5" />
          <rect x="14" y="12" width="7" height="9" />
          <rect x="3" y="16" width="7" height="5" />
        </svg>
      </button>
    </header>

    <!-- Main Content Tab Saver -->
    <main class="app-main">
      <div class="stats-badge">
        <span id="tab-count-label">0 tabs open in current window</span>
      </div>

      <!-- Quick Save Form -->
      <section class="save-section">
        <div class="form-group">
          <label for="instance-name">Instance Name</label>
          <input type="text" id="instance-name" placeholder="e.g., Physics Assignment 3" autocomplete="off">
        </div>

        <!-- Open Tabs Selector -->
        <div class="form-group">
          <div class="tabs-select-header">
            <label>Select Tabs to Save</label>
            <button id="btn-toggle-select-all" class="text-link-btn" type="button">Deselect All</button>
          </div>
          <div id="tabs-list-select" class="tabs-select-list">
            <!-- Dynamically populated checklist -->
          </div>
        </div>

        <div class="form-group">
          <label for="instance-notes">Notes & Key Reminders (Optional)</label>
          <textarea id="instance-notes" rows="2" placeholder="What were you working on? Add key topics..."></textarea>
        </div>

        <div class="action-buttons">
          <button id="btn-save-close" class="primary-gradient-btn" title="Dock these tabs into a workspace and close them to free RAM">
            Save &amp; Close Tabs
          </button>
          <button id="btn-save-keep" class="secondary-btn" title="Dock workspace but keep tabs open in this window">
            Save &amp; Keep Open
          </button>
        </div>
      </section>

      <hr class="divider">

      <!-- Recent Workspaces List -->
      <section class="recent-section">
        <h2>Recent Instances</h2>
        <div id="recent-list" class="recent-list-container">
          <!-- Dynamically populated -->
          <div class="empty-state">No saved instances yet. Create one above!</div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <a id="lnk-dashboard" href="#" class="footer-link">Go to Full Dashboard &rarr;</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
